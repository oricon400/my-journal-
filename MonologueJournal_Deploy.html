<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Monologue Journal</title>
    <!-- 모바일 앱 아이콘 및 테마 설정 (PWA) -->
    <meta name="theme-color" content="#1a1a1a">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <style>
        :root {
            --bg-color: #121212;
            --card-bg: #1e1e1e;
            --text-primary: #ffffff;
            --text-secondary: #b0b0b0;
            --accent: #bb86fc;
            --danger: #cf6679;
            --success: #03dac6;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body {
            font-family: 'Pretendard', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-primary);
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .app-container {
            width: 100%;
            max-width: 450px;
            margin-top: 40px;
        }

        header {
            text-align: center;
            margin-bottom: 30px;
        }

        h1 { font-size: 1.2rem; font-weight: 300; color: var(--text-secondary); letter-spacing: 2px; }

        .date-nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: var(--card-bg);
            padding: 15px 20px;
            border-radius: 15px;
            margin-bottom: 20px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }

        .date-display { font-size: 1.1rem; font-weight: 600; cursor: pointer; }
        .nav-btn { background: none; border: none; color: var(--accent); font-size: 1.5rem; cursor: pointer; padding: 0 10px; }

        .input-card {
            background: var(--card-bg);
            border-radius: 15px;
            padding: 20px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            border-left: 4px solid var(--accent);
        }

        textarea {
            width: 100%;
            height: 200px;
            background: transparent;
            border: none;
            color: var(--text-primary);
            font-size: 1.1rem;
            line-height: 1.7;
            resize: none;
            outline: none;
            padding: 0;
        }

        .controls {
            display: flex;
            justify-content: space-between;
            margin-top: 30px;
            gap: 10px;
        }

        button.main-btn {
            flex: 1;
            background: var(--accent);
            color: #000;
            border: none;
            padding: 15px;
            border-radius: 12px;
            font-weight: 700;
            cursor: pointer;
            transition: opacity 0.2s;
        }

        .settings-panel {
            margin-top: 50px;
            border-top: 1px solid #333;
            padding-top: 20px;
            display: flex;
            justify-content: center;
            gap: 20px;
        }

        .icon-btn {
            background: none;
            border: none;
            color: var(--text-secondary);
            font-size: 0.8rem;
            cursor: pointer;
            text-decoration: underline;
        }

        #toast {
            position: fixed;
            bottom: 30px;
            background: var(--success);
            color: #000;
            padding: 12px 25px;
            border-radius: 25px;
            font-weight: 600;
            display: none;
            animation: slideUp 0.3s ease-out;
        }

        @keyframes slideUp { from { transform: translateY(100px); } to { transform: translateY(0); } }
    </style>
</head>
<body>

    <div class="app-container">
        <header>
            <h1>MONOLOGUE JOURNAL</h1>
        </header>

        <div class="date-nav">
            <button class="nav-btn" onclick="moveDate(-1)">❮</button>
            <div class="date-display" id="dateDisplay" onclick="goToday()">2026. 03. 22</div>
            <button class="nav-btn" onclick="moveDate(1)">❯</button>
        </div>

        <div class="input-card">
            <textarea id="journalInput" placeholder="이곳에 오늘의 짧은 독백을 남기세요..."></textarea>
        </div>

        <div class="controls">
            <button class="main-btn" onclick="saveEntry()">저장하기</button>
        </div>

        <div class="settings-panel">
            <button class="icon-btn" onclick="exportData()">데이터 백업(다운로드)</button>
            <button class="icon-btn" onclick="importData()">데이터 복구(불러오기)</button>
        </div>
        <input type="file" id="importFile" style="display:none" onchange="handleFile(this)">
    </div>

    <div id="toast">성공적으로 저장되었습니다.</div>

    <script>
        let currentStatusDate = new Date();
        const inputField = document.getElementById('journalInput');
        const dateDisplay = document.getElementById('dateDisplay');

        function formatDate(date) {
            return date.toISOString().split('T')[0];
        }

        function updateUI() {
            const dateStr = formatDate(currentStatusDate);
            dateDisplay.innerText = dateStr.replace(/-/g, '. ');
            
            const db = JSON.parse(localStorage.getItem('monologue_db') || '{}');
            inputField.value = db[dateStr] || "";
        }

        function moveDate(days) {
            currentStatusDate.setDate(currentStatusDate.getDate() + days);
            updateUI();
        }

        function goToday() {
            currentStatusDate = new Date();
            updateUI();
        }

        function saveEntry() {
            const dateStr = formatDate(currentStatusDate);
            const db = JSON.parse(localStorage.getItem('monologue_db') || '{}');
            db[dateStr] = inputField.value;
            localStorage.setItem('monologue_db', JSON.stringify(db));
            showToast("안전하게 저장되었습니다.");
        }

        function showToast(msg) {
            const toast = document.getElementById('toast');
            toast.innerText = msg;
            toast.style.display = 'block';
            setTimeout(() => { toast.style.display = 'none'; }, 2000);
        }

        // 데이터 내보내기 (JSON 다운로드)
        function exportData() {
            const data = localStorage.getItem('monologue_db') || '{}';
            const blob = new Blob([data], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `monologue_backup_${formatDate(new Date())}.json`;
            a.click();
        }

        // 데이터 가져오기 (파일 선택)
        function importData() {
            document.getElementById('importFile').click();
        }

        function handleFile(input) {
            const file = input.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = function(e) {
                try {
                    const data = JSON.parse(e.target.result);
                    if (confirm("기존 데이터가 덮어씌워질 수 있습니다. 진행할까요?")) {
                        localStorage.setItem('monologue_db', JSON.stringify(data));
                        updateUI();
                        showToast("데이터가 성공적으로 복구되었습니다.");
                    }
                } catch (err) {
                    alert("올바른 백업 파일이 아닙니다.");
                }
            };
            reader.readAsText(file);
        }

        // 초기화
        updateUI();
    </script>
</body>
</html>
